<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escalade Model Library Assets</title>
  <meta name="description" content="Asset repository for the Escalade Model Gallery." />
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b0d12;color:#eef2ff;font-family:Inter,system-ui,sans-serif;padding:24px}
    .card{width:min(100%,720px);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
    a{color:#c9d5ff;text-decoration:none} code{background:rgba(255,255,255,.07);padding:2px 8px;border-radius:8px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Escalade Model Library Assets</h1>
    <p>This repository stores the downloadable 3D model assets used by the Escalade Model Gallery.</p>
    <p>Example raw asset path:</p>
    <p><code>assets/stl/green-dragon.stl</code></p>
    <p><a href="https://github.com/EscaladeDev/model-gallery-site">View the gallery site repo</a></p>
  </main>
</body>
</html>
